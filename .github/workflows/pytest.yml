name: Python Application Testing

# Trigger the workflow on pushes/pull requests and on a daily schedule
on:
  push:
    branches: [ "main", "master" , "KKTPBranch"]
  pull_request:
    branches: [ "main", "master" , "KKTPBranch"]
  schedule:
    - cron: '0 8 * * *' # Runs at 8:00 AM UTC every day

jobs:
  test:
    # Run the tests on an Ubuntu Linux runner hosted by GitHub
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out your repository code so the runner can access it
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Step 2: Set up the correct Python environment
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11" # Match your local Python version

    # Step 3: Cache dependencies to speed up subsequent workflow runs
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Step 4: Install the required dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Safely ensure essential CI tools are installed even if missing from requirements.txt
        pip install flake8 pytest-html
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 5: Create the Firebase service account key from a GitHub Secret
    - name: Create serviceAccountKey.json
      run: echo "$FIREBASE_KEY" > serviceAccountKey.json
      shell: bash
      env:
        FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
      if: ${{ env.FIREBASE_KEY != '' }}

    # Step 6: Lint with flake8
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # Step 7: Run the Pytest suite
    - name: Run automated tests with pytest
      run: |
        pytest -v --html=pytest_report.html --self-contained-html

    # Step 8: Upload Test Report
    - name: Upload test report
      uses: actions/upload-artifact@v4
      if: always() # Always run this step to upload the report, even if tests fail
      with:
        name: pytest-report
        path: pytest_report.html